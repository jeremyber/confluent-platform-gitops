domainFilters:
  - platform.dspdemos.com

# txtOwnerId scopes all TXT ownership records to this cluster, making policy: sync
# safe on the shared platform.dspdemos.com zone — ExternalDNS will only delete
# records it originally created for mochi, not records owned by other clusters.
txtOwnerId: mochi

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::829250931565:role/ExternalDNS_mochi-eks-cluster
