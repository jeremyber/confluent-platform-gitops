---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: s3proxy
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "106"
spec:
  project: workloads
  source:
    repoURL: https://github.com/jeremyber/confluent-platform-gitops.git
    targetRevision: feature/flink-demo-evolution
    path: workloads/s3proxy/overlays/flink-demo
  destination:
    server: https://kubernetes.default.svc
    namespace: flink
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
