# Keycloak Realm Sync Job
# Ensures Keycloak realm configuration matches the ConfigMap
# Runs as a Job to update client secrets and configuration via Admin API
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak-realm-sync
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-realm-sync
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: keycloak-realm-sync
    spec:
      serviceAccountName: keycloak-realm-sync
      restartPolicy: OnFailure
      containers:
        - name: realm-sync
          image: curlimages/curl:latest
          env:
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: KEYCLOAK_ADMIN
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: KEYCLOAK_ADMIN_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              set -e

              echo "=== Keycloak Realm Sync ==="

              # Wait for Keycloak to be ready
              echo "Waiting for Keycloak to be ready..."
              until curl -sf http://keycloak:8080/realms/master/.well-known/openid-configuration > /dev/null; do
                echo "Keycloak not ready, waiting..."
                sleep 5
              done
              echo "Keycloak is ready"

              # Get admin token
              echo "Getting admin access token..."
              ADMIN_TOKEN=$(curl -sf -X POST http://keycloak:8080/realms/master/protocol/openid-connect/token \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -d "username=${KEYCLOAK_ADMIN}" \
                -d "password=${KEYCLOAK_ADMIN_PASSWORD}" \
                -d "grant_type=password" \
                -d "client_id=admin-cli" | grep -o '"access_token":"[^"]*' | cut -d'"' -f4)

              if [ -z "$ADMIN_TOKEN" ]; then
                echo "ERROR: Failed to get admin token"
                exit 1
              fi
              echo "Admin token obtained"

              # Update CMF client secret
              echo "Updating CMF client secret..."
              CMF_CLIENT_ID=$(curl -sf -X GET "http://keycloak:8080/admin/realms/confluent/clients?clientId=cmf" \
                -H "Authorization: Bearer $ADMIN_TOKEN" | grep -o '"id":"[^"]*' | head -1 | cut -d'"' -f4)

              if [ -n "$CMF_CLIENT_ID" ]; then
                echo "Found CMF client: $CMF_CLIENT_ID"
                curl -sf -X PUT "http://keycloak:8080/admin/realms/confluent/clients/$CMF_CLIENT_ID" \
                  -H "Authorization: Bearer $ADMIN_TOKEN" \
                  -H "Content-Type: application/json" \
                  -d '{"secret":"cmf-secret"}'
                echo "CMF client secret updated"
              else
                echo "WARNING: CMF client not found, may need realm re-import"
              fi

              # Update Kafka client secret
              echo "Updating Kafka client secret..."
              KAFKA_CLIENT_ID=$(curl -sf -X GET "http://keycloak:8080/admin/realms/confluent/clients?clientId=kafka" \
                -H "Authorization: Bearer $ADMIN_TOKEN" | grep -o '"id":"[^"]*' | head -1 | cut -d'"' -f4)

              if [ -n "$KAFKA_CLIENT_ID" ]; then
                echo "Found Kafka client: $KAFKA_CLIENT_ID"
                curl -sf -X PUT "http://keycloak:8080/admin/realms/confluent/clients/$KAFKA_CLIENT_ID" \
                  -H "Authorization: Bearer $ADMIN_TOKEN" \
                  -H "Content-Type: application/json" \
                  -d '{"secret":"kafka-secret"}'
                echo "Kafka client secret updated"
              else
                echo "WARNING: Kafka client not found, may need realm re-import"
              fi

              # Update Control Center client secret and scopes
              echo "Updating Control Center client secret..."
              CONTROLCENTER_CLIENT_ID=$(curl -sf -X GET "http://keycloak:8080/admin/realms/confluent/clients?clientId=controlcenter" \
                -H "Authorization: Bearer $ADMIN_TOKEN" | grep -o '"id":"[^"]*' | head -1 | cut -d'"' -f4)

              if [ -n "$CONTROLCENTER_CLIENT_ID" ]; then
                echo "Found Control Center client: $CONTROLCENTER_CLIENT_ID"
                curl -sf -X PUT "http://keycloak:8080/admin/realms/confluent/clients/$CONTROLCENTER_CLIENT_ID" \
                  -H "Authorization: Bearer $ADMIN_TOKEN" \
                  -H "Content-Type: application/json" \
                  -d '{"secret":"controlcenter-secret"}'
                echo "Control Center client secret updated"

                # Add offline_access to DEFAULT client scopes (not optional)
                echo "Configuring Control Center client scopes..."
                # Fetch all client scopes and find offline_access
                SCOPES_JSON=$(curl -sf -X GET "http://keycloak:8080/admin/realms/confluent/client-scopes" \
                  -H "Authorization: Bearer $ADMIN_TOKEN")

                # Extract the ID for offline_access scope (search for the name, then extract the id from that entry)
                OFFLINE_ACCESS_SCOPE_ID=$(echo "$SCOPES_JSON" | grep -A 5 '"name":"offline_access"' | grep -o '"id":"[^"]*' | head -1 | cut -d'"' -f4)

                if [ -n "$OFFLINE_ACCESS_SCOPE_ID" ]; then
                  echo "Found offline_access scope: $OFFLINE_ACCESS_SCOPE_ID"

                  # Remove from optional scopes first (in case it's already there)
                  curl -sf -X DELETE "http://keycloak:8080/admin/realms/confluent/clients/$CONTROLCENTER_CLIENT_ID/optional-client-scopes/$OFFLINE_ACCESS_SCOPE_ID" \
                    -H "Authorization: Bearer $ADMIN_TOKEN" 2>/dev/null || true

                  # Add to DEFAULT scopes (automatically included in all requests)
                  curl -sf -X PUT "http://keycloak:8080/admin/realms/confluent/clients/$CONTROLCENTER_CLIENT_ID/default-client-scopes/$OFFLINE_ACCESS_SCOPE_ID" \
                    -H "Authorization: Bearer $ADMIN_TOKEN" \
                    -H "Content-Type: application/json"
                  echo "offline_access scope added to Control Center client as DEFAULT scope"
                else
                  echo "WARNING: offline_access scope not found"
                fi
              else
                echo "WARNING: Control Center client not found, may need realm re-import"
              fi

              echo "=== Realm sync complete ==="
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
