# MDS Token Public Key Copy Job
# Copies the MDS public key from kafka namespace to operator namespace
# CMF needs this to validate MDS-signed SSO tokens from Control Center
# Runs as ArgoCD PreSync hook after mds-keygen job completes
---
# ServiceAccount for the copy job
# Note: This gets created in kafka namespace due to kustomization.yaml namespace override
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mds-token-copier
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
    argocd.argoproj.io/hook: PreSync
---
# Role to read from kafka namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mds-token-reader
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
    argocd.argoproj.io/hook: PreSync
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["mds-token"]
---
# RoleBinding in kafka namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mds-token-copier-reader
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
    argocd.argoproj.io/hook: PreSync
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mds-token-reader
subjects:
  - kind: ServiceAccount
    name: mds-token-copier
    namespace: kafka
---
# Role to write to operator namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mds-token-writer
  namespace: operator
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
    argocd.argoproj.io/hook: PreSync
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
    resourceNames: ["mds-token"]
  # Allow creating the secret if it doesn't exist (no resourceName restriction)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
# RoleBinding in operator namespace
# This must explicitly set namespace since it's cross-namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mds-token-copier-writer
  namespace: operator
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
    argocd.argoproj.io/hook: PreSync
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mds-token-writer
subjects:
  - kind: ServiceAccount
    name: mds-token-copier
    namespace: kafka
---
# Job to copy MDS public key
# Note: This gets created in kafka namespace due to kustomization.yaml namespace override
apiVersion: batch/v1
kind: Job
metadata:
  name: mds-token-copier
  annotations:
    argocd.argoproj.io/sync-wave: "-7"
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300  # Clean up 5 minutes after completion
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: mds-token-copier
    spec:
      serviceAccountName: mds-token-copier
      restartPolicy: OnFailure
      containers:
        - name: copier
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e

              echo "=== MDS Token Public Key Copier ==="

              # Wait for mds-token to exist in kafka namespace
              echo "Waiting for mds-token secret in kafka namespace..."
              for i in {1..30}; do
                if kubectl get secret mds-token -n kafka >/dev/null 2>&1; then
                  echo "Found mds-token secret in kafka namespace"
                  break
                fi
                echo "Attempt $i/30: mds-token not found, waiting 10 seconds..."
                sleep 10
              done

              # Verify the secret exists
              if ! kubectl get secret mds-token -n kafka >/dev/null 2>&1; then
                echo "ERROR: mds-token secret not found in kafka namespace after 5 minutes"
                exit 1
              fi

              # Extract the public key
              echo "Extracting MDS public key from kafka namespace..."
              PUBLIC_KEY=$(kubectl get secret mds-token -n kafka -o jsonpath='{.data.mdsPublicKey\.pem}')

              if [ -z "$PUBLIC_KEY" ]; then
                echo "ERROR: Public key is empty"
                exit 1
              fi

              # Validate it's a real public key (not placeholder)
              PUBLIC_KEY_DECODED=$(echo "$PUBLIC_KEY" | base64 -d)
              if ! echo "$PUBLIC_KEY_DECODED" | grep -q "BEGIN PUBLIC KEY"; then
                echo "ERROR: Invalid public key format"
                exit 1
              fi

              echo "Public key extracted successfully"

              # Create or update the secret in operator namespace (public key only)
              echo "Creating/updating mds-token secret in operator namespace..."

              kubectl create secret generic mds-token \
                --from-literal=mdsPublicKey.pem="$PUBLIC_KEY_DECODED" \
                --namespace operator \
                --dry-run=client -o yaml | kubectl apply -f -

              echo "Secret mds-token created/updated successfully in operator namespace"

              echo "=== Public key copy complete ==="
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
