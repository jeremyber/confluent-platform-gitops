# KRaft Controller RBAC Configuration Patch
# Enables RBAC authorization for KRaft controllers
# NOTE: KRaft controllers form the control plane quorum and must start independently
# MDS dependency removed to avoid circular dependency (KRaft needs to start before Kafka brokers)
# TODO: Issue #72 - Add mTLS authentication to MDS when TLS is implemented
apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kraftcontroller
  namespace: kafka
spec:
  # Enable RBAC authorization with superusers for control plane operations
  authorization:
    type: rbac
    superUsers:
      - User:kafka
      - User:kraftcontroller
      - User:admin@osow.ski
