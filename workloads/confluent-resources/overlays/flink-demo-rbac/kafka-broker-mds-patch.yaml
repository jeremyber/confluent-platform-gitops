# Kafka Broker MDS/RBAC Configuration Patch
# Enables MDS (Metadata Service) with OAuth provider for RBAC authorization
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: kafka
spec:
  # Enable MDS (Metadata Service) for RBAC
  services:
    mds:
      # Token key pair for signing MDS authentication tokens
      tokenKeyPair:
        secretRef: mds-token
      # OAuth provider configuration - uses Keycloak
      provider:
        oauth:
          configurations:
            # Keycloak JWKS endpoint for token validation
            jwksEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/certs
            # Expected issuer (must match external URL)
            expectedIssuer: http://keycloak.flink-demo-rbac.confluentdemo.local:30080/realms/confluent
            # Principal claim - use email as user identifier
            subClaimName: email
      # Impersonation settings
      impersonation:
        admins:
          - User:kafka
          - User:krp  # Kafka REST Proxy principal
          - User:admin@osow.ski  # Admin user from Keycloak
        protectedUsers:
          - User:mds
          - User:superadmin

  # Enable RBAC authorization
  authorization:
    type: rbac
    superUsers:
      - User:kafka
      - User:admin@osow.ski

  # Kafka REST configuration for MDS
  dependencies:
    kafkaRest:
      authentication:
        type: oauth
        # JAAS configuration with OAuth client credentials
        jaasConfig:
          secretRef: kafka-oauth-client
        oauthSettings:
          tokenEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token
          expectedIssuer: http://keycloak.flink-demo-rbac.confluentdemo.local:30080/realms/confluent
          jwksEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/certs
          subClaimName: email

  # JVM configuration for OAuth SASL mechanism
  configOverrides:
    jvm:
      # Enable OAuthBearer SASL mechanism
      - "-Djava.security.auth.login.config=/opt/confluentinc/etc/kafka/kafka.properties.jaas.conf"
      # Allow Keycloak token endpoint URLs
      - "-Dorg.apache.kafka.common.security.oauthbearer.OAuthBearerLoginCallbackHandler.JWKS_ENDPOINT_REFRESH_MS=3600000"
