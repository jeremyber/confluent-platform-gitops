# Kafka Broker to KRaft Controller Authentication Patch
# Configures OAuth authentication for broker-to-controller communication
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: kafka
spec:
  dependencies:
    kRaftController:
      controllerListener:
        authentication:
          type: oauth
          jaasConfig:
            secretRef: kafka-oauth-client
          oauthSettings:
            tokenEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token
      clusterRef:
        name: kraftcontroller
