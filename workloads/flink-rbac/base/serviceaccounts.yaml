---
# ServiceAccount for shapes group users in flink-shapes namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: shapes-group
  namespace: flink-shapes
  labels:
    group: shapes
---
# ServiceAccount for colors group users in flink-colors namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: colors-group
  namespace: flink-colors
  labels:
    group: colors
---
# Note: The 'flink' ServiceAccount for Flink job pods is automatically created
# by the Flink Kubernetes Operator in all watched namespaces (flink, flink-shapes, flink-colors).
# We do not need to create it here.
---
# ServiceAccount for Flink admin (cluster-wide access)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink-admin
  namespace: default
  labels:
    role: flink-admin
