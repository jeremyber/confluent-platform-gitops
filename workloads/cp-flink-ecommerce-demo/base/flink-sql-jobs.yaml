---
apiVersion: v1
kind: ConfigMap
metadata:
  name: flink-sql-statements
  namespace: flink
data:
  create-datagen-users.sql: |
    CREATE TABLE IF NOT EXISTS `_datagen_users` (
      `seq` INT
    ) WITH (
      'connector' = 'datagen',
      'rows-per-second' = '10',
      'fields.seq.kind' = 'sequence',
      'fields.seq.start' = '1',
      'fields.seq.end' = '2147483647'
    )
  create-datagen-orders.sql: |
    CREATE TABLE IF NOT EXISTS `_datagen_orders` (
      `seq` INT
    ) WITH (
      'connector' = 'datagen',
      'rows-per-second' = '100',
      'fields.seq.kind' = 'random',
      'fields.seq.min' = '1',
      'fields.seq.max' = '1000000'
    )
  create-datagen-clickstream.sql: |
    CREATE TABLE IF NOT EXISTS `_datagen_clickstream` (
      `seq` INT
    ) WITH (
      'connector' = 'datagen',
      'rows-per-second' = '100',
      'fields.seq.kind' = 'random',
      'fields.seq.min' = '1',
      'fields.seq.max' = '1000000'
    )
  datagen-users.sql: |
    INSERT INTO `kafka-cat`.`main-kafka-cluster`.`users`
    SELECT
      CONCAT('user-', CAST(MOD(`seq`, 1000) + 1 AS STRING)) AS `user_id`,
      CASE MOD(`seq`, 20)
        WHEN 0 THEN 'Alice Johnson'
        WHEN 1 THEN 'Bob Smith'
        WHEN 2 THEN 'Carol Williams'
        WHEN 3 THEN 'David Brown'
        WHEN 4 THEN 'Emma Davis'
        WHEN 5 THEN 'Frank Miller'
        WHEN 6 THEN 'Grace Wilson'
        WHEN 7 THEN 'Henry Moore'
        WHEN 8 THEN 'Iris Taylor'
        WHEN 9 THEN 'Jack Anderson'
        WHEN 10 THEN 'Karen Thomas'
        WHEN 11 THEN 'Leo Jackson'
        WHEN 12 THEN 'Mia White'
        WHEN 13 THEN 'Noah Harris'
        WHEN 14 THEN 'Olivia Martin'
        WHEN 15 THEN 'Paul Garcia'
        WHEN 16 THEN 'Quinn Martinez'
        WHEN 17 THEN 'Rachel Robinson'
        WHEN 18 THEN 'Sam Clark'
        ELSE 'Tina Rodriguez'
      END AS `name`,
      CONCAT(
        LOWER(CASE MOD(`seq`, 20)
          WHEN 0 THEN 'alice.johnson'
          WHEN 1 THEN 'bob.smith'
          WHEN 2 THEN 'carol.williams'
          WHEN 3 THEN 'david.brown'
          WHEN 4 THEN 'emma.davis'
          WHEN 5 THEN 'frank.miller'
          WHEN 6 THEN 'grace.wilson'
          WHEN 7 THEN 'henry.moore'
          WHEN 8 THEN 'iris.taylor'
          WHEN 9 THEN 'jack.anderson'
          WHEN 10 THEN 'karen.thomas'
          WHEN 11 THEN 'leo.jackson'
          WHEN 12 THEN 'mia.white'
          WHEN 13 THEN 'noah.harris'
          WHEN 14 THEN 'olivia.martin'
          WHEN 15 THEN 'paul.garcia'
          WHEN 16 THEN 'quinn.martinez'
          WHEN 17 THEN 'rachel.robinson'
          WHEN 18 THEN 'sam.clark'
          ELSE 'tina.rodriguez'
        END),
        CASE MOD(`seq`, 3)
          WHEN 0 THEN '@example.com'
          WHEN 1 THEN '@acme.io'
          ELSE '@testmail.org'
        END
      ) AS `email`,
      CASE MOD(`seq`, 5)
        WHEN 0 THEN 'US-East'
        WHEN 1 THEN 'US-West'
        WHEN 2 THEN 'EU-West'
        WHEN 3 THEN 'EU-Central'
        ELSE 'APAC'
      END AS `region`,
      PROCTIME() AS `registered_at`
    FROM `_datagen_users`
  datagen-orders.sql: |
    INSERT INTO `kafka-cat`.`main-kafka-cluster`.`orders`
    SELECT
      CONCAT('order-', CAST(`seq` AS STRING), '-', CAST(CURRENT_TIMESTAMP AS STRING)) AS `order_id`,
      CONCAT('user-', CAST(CAST(FLOOR(RAND() * 1000) + 1 AS INT) AS STRING)) AS `user_id`,
      CASE CAST(FLOOR(RAND() * 15) AS INT)
        WHEN 0 THEN 'Wireless Headphones'
        WHEN 1 THEN 'Laptop Stand'
        WHEN 2 THEN 'Mechanical Keyboard'
        WHEN 3 THEN 'USB-C Hub'
        WHEN 4 THEN 'Webcam HD Pro'
        WHEN 5 THEN 'Monitor 27 inch'
        WHEN 6 THEN 'Mouse Pad XL'
        WHEN 7 THEN 'Phone Case'
        WHEN 8 THEN 'Bluetooth Speaker'
        WHEN 9 THEN 'Desk Lamp'
        WHEN 10 THEN 'Cable Organizer'
        WHEN 11 THEN 'Screen Protector'
        WHEN 12 THEN 'Portable Charger'
        WHEN 13 THEN 'Smart Watch'
        ELSE 'Tablet Sleeve'
      END AS `product`,
      ROUND(RAND() * 495 + 5, 2) AS `amount`,
      CASE CAST(FLOOR(RAND() * 3) AS INT)
        WHEN 0 THEN 'USD'
        WHEN 1 THEN 'EUR'
        ELSE 'GBP'
      END AS `currency`,
      PROCTIME() AS `order_time`
    FROM `_datagen_orders`
  datagen-clickstream.sql: |
    INSERT INTO `kafka-cat`.`main-kafka-cluster`.`clickstream`
    SELECT
      CONCAT('session-', CAST(CAST(FLOOR(RAND() * 50000) AS INT) AS STRING)) AS `session_id`,
      CONCAT('user-', CAST(CAST(FLOOR(RAND() * 1000) + 1 AS INT) AS STRING)) AS `user_id`,
      CASE CAST(FLOOR(RAND() * 12) AS INT)
        WHEN 0 THEN '/products/headphones'
        WHEN 1 THEN '/products/laptop-stand'
        WHEN 2 THEN '/products/keyboard'
        WHEN 3 THEN '/cart'
        WHEN 4 THEN '/checkout'
        WHEN 5 THEN '/account/orders'
        WHEN 6 THEN '/search?q=electronics'
        WHEN 7 THEN '/categories/accessories'
        WHEN 8 THEN '/products/monitor'
        WHEN 9 THEN '/deals'
        WHEN 10 THEN '/account/wishlist'
        ELSE '/homepage'
      END AS `page_url`,
      CASE CAST(FLOOR(RAND() * 5) AS INT)
        WHEN 0 THEN 'view'
        WHEN 1 THEN 'click'
        WHEN 2 THEN 'add_to_cart'
        WHEN 3 THEN 'search'
        ELSE 'purchase'
      END AS `action`,
      PROCTIME() AS `event_time`
    FROM `_datagen_clickstream`
  enriched-orders.sql: |
    INSERT INTO `kafka-cat`.`main-kafka-cluster`.`enriched-orders`
    SELECT
      o.`order_id`,
      o.`user_id`,
      o.`product`,
      o.`amount`,
      o.`currency`,
      o.`order_time`,
      u.`name`,
      u.`email`,
      u.`region`,
      c.`click_count`,
      c.`last_page_url`
    FROM `kafka-cat`.`main-kafka-cluster`.`orders` o
    JOIN `kafka-cat`.`main-kafka-cluster`.`users` FOR SYSTEM_TIME AS OF o.`order_time` AS u
      ON o.`user_id` = u.`user_id`
    LEFT JOIN (
      SELECT
        `user_id`,
        COUNT(*) AS `click_count`,
        LAST_VALUE(`page_url`) AS `last_page_url`
      FROM `kafka-cat`.`main-kafka-cluster`.`clickstream`
      GROUP BY `user_id`, HOP(`event_time`, INTERVAL '1' MINUTE, INTERVAL '5' MINUTES)
    ) c ON o.`user_id` = c.`user_id`
  user-activity.sql: |
    INSERT INTO `kafka-cat`.`main-kafka-cluster`.`user-activity`
    SELECT
      u.`user_id`,
      u.`name`,
      u.`email`,
      u.`region`,
      o.`order_count`,
      o.`total_spend`,
      c.`click_count`,
      c.`unique_pages`,
      c.`window_start`
    FROM `kafka-cat`.`main-kafka-cluster`.`users` FOR SYSTEM_TIME AS OF c.`window_start` AS u
    LEFT JOIN (
      SELECT
        `user_id`,
        COUNT(*) AS `order_count`,
        SUM(`amount`) AS `total_spend`,
        `window_start`,
        `window_end`
      FROM TABLE(
        TUMBLE(TABLE `kafka-cat`.`main-kafka-cluster`.`orders`, DESCRIPTOR(`order_time`), INTERVAL '5' MINUTES)
      )
      GROUP BY `user_id`, `window_start`, `window_end`
    ) o ON u.`user_id` = o.`user_id`
    LEFT JOIN (
      SELECT
        `user_id`,
        COUNT(*) AS `click_count`,
        COUNT(DISTINCT `page_url`) AS `unique_pages`,
        `window_start`,
        `window_end`
      FROM TABLE(
        TUMBLE(TABLE `kafka-cat`.`main-kafka-cluster`.`clickstream`, DESCRIPTOR(`event_time`), INTERVAL '5' MINUTES)
      )
      GROUP BY `user_id`, `window_start`, `window_end`
    ) c ON u.`user_id` = c.`user_id` AND o.`window_start` = c.`window_start`
---
apiVersion: batch/v1
kind: Job
metadata:
  name: flink-sql-jobs-init
  namespace: flink
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  template:
    metadata:
      name: flink-sql-jobs-init
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-cmf
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for CMF to be ready..."
          until nc -z cmf-service.operator.svc.cluster.local 80; do
            echo "CMF not ready yet, waiting..."
            sleep 5
          done
          echo "CMF is ready!"
      - name: wait-for-catalog
        image: curlimages/curl:latest
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for kafka-cat catalog to be available..."
          until curl -sf http://cmf-service.operator.svc.cluster.local:80/cmf/api/v1/catalogs/kafka/kafka-cat/databases 2>/dev/null | grep -q "main-kafka-cluster"; do
            echo "Catalog/database not ready yet, waiting..."
            sleep 10
          done
          echo "Catalog and database are ready!"
      - name: wait-for-compute-pool
        image: confluentinc/confluent-cli:4.53.0
        env:
        - name: CMF_URL
          value: "http://cmf-service.operator.svc.cluster.local:80"
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for compute pool to be ready..."
          until confluent flink compute-pool list --environment env1 --url ${CMF_URL} 2>/dev/null | grep -q "ecommerce-pool"; do
            echo "Compute pool not ready yet, waiting..."
            sleep 10
          done
          echo "Compute pool is ready!"
      containers:
      - name: submit-sql-statements
        image: confluentinc/confluent-cli:4.53.0
        env:
        - name: CMF_URL
          value: "http://cmf-service.operator.svc.cluster.local:80"
        volumeMounts:
        - name: sql-statements
          mountPath: /sql
        command:
        - /bin/sh
        - -c
        - |
          set -e

          submit_statement() {
            local name=$1
            local sql_file=$2

            # Delete any previously failed statement with the same name
            echo "Checking for existing statement ${name}..."
            if confluent flink statement list --environment env1 --url ${CMF_URL} 2>/dev/null | grep -q "${name}"; then
              echo "Deleting existing statement ${name}..."
              confluent flink statement delete ${name} \
                --environment env1 \
                --url ${CMF_URL} --force 2>/dev/null || true
              sleep 2
            fi

            echo "Submitting ${name} SQL job..."
            confluent flink statement create ${name} \
              --sql "$(cat ${sql_file})" \
              --compute-pool ecommerce-pool \
              --environment env1 \
              --database main-kafka-cluster \
              --catalog kafka-cat \
              --url ${CMF_URL}
          }

          # Step 1: Create datagen source tables
          for job in create-datagen-users create-datagen-orders create-datagen-clickstream; do
            submit_statement "${job}" "/sql/${job}.sql"
            sleep 2
          done

          echo "Datagen source tables created. Submitting INSERT jobs..."

          # Step 2: Submit datagen INSERT jobs to start producing data
          for job in datagen-users datagen-orders datagen-clickstream; do
            submit_statement "${job}" "/sql/${job}.sql"
            sleep 2
          done

          echo "Waiting 10s for data to start flowing..."
          sleep 10

          # Step 3: Submit join/aggregation jobs
          for job in enriched-orders user-activity; do
            submit_statement "${job}" "/sql/${job}.sql"
            sleep 2
          done

          echo "Listing running statements..."
          confluent flink statement list \
            --environment env1 \
            --url ${CMF_URL}

          echo "SQL jobs submission complete!"
      volumes:
      - name: sql-statements
        configMap:
          name: flink-sql-statements
