---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: users
  namespace: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  replicas: 3
  partitionCount: 6
  kafkaRestClassRef:
    name: default
    namespace: kafka
  configs:
    cleanup.policy: "compact"
