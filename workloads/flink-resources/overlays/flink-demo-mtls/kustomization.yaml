apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference base configuration
resources:
  - ../../base

# Strategic merge patch to enable mTLS
patches:
  - path: cmfrestclass-patch.yaml
    target:
      kind: CMFRestClass
      name: cmf-rest-class

# Cluster-specific labels
labels:
- includeSelectors: false
  includeTemplates: true
  pairs:
    cluster: flink-demo-mtls
